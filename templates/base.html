<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Citas veterinarias{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6fb;
    }

    .navbar-custom {
      background: linear-gradient(90deg, #1e3a8a, #4f46e5);
    }

    .btn-accent {
      background-color: #6366f1;
      color: white;
      border: none;
    }

    .btn-accent:hover {
      background-color: #4f46e5;
    }

    footer {
      background: #1e293b;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold fs-4" href="{{ url_for('agenda') }}">
      <i class="bi bi-heart-pulse-fill me-2"></i>CitasVeterinaria.
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-3">

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('agenda') }}">
            <i class="bi bi-calendar3 me-1"></i>Agenda Completa
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-accent fw-semibold px-3" href="{{ url_for('agendar') }}">
            <i class="bi bi-plus-circle me-1"></i>Nueva Cita
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>


<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<footer class="text-white text-center py-3 mt-5">
  <small>Sistema de Gestión Veterinaria</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
